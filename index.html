function formatThaiDate(dateStr) {
  const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function formatThaiDateShort(dateStr) {
  const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}

}

function ContentRenderer({ content }) {
  const lines = content.split("\n");
  return (
    <div style={{ lineHeight: 1.8, color: "#1e293b" }}>
      {lines.map((line, i) => {
        const t = line.trim();
        if (!t) return <div key={i} style={{ height: 12 }} />;
        const isH = /^(🔹|📉|🤖|🏭|🔬|📌|👥|📗|📕|📘|🛡️|📊|🧠|🌍|📈|🔎|🏗️|🕊️|🧭|💰|🚀|📋|🇹🇭)/.test(t);
        const isHi = /^(💡|👉|⚠️)/.test(t);
        const isBul = /^(▸|✅|❌)/.test(t);
        const isSec = /^(ทำไม|วิเคราะห์|ปัจจัยบวก|พื้นฐาน:|[1-4]️⃣)/.test(t);
        if (isH) return <p key={i} style={{ fontWeight: 700, fontSize: 15, color: "#0f766e", marginTop: 20, marginBottom: 6, borderLeft: "3px solid #0d9488", paddingLeft: 12 }}>{t}</p>;
        if (isHi) return <p key={i} style={{ fontWeight: 600, fontSize: 14, color: "#0f766e", margin: "10px 0 4px", padding: "8px 12px", background: "#f0fdfa", borderRadius: 6, border: "1px solid #ccfbf1" }}>{t}</p>;
        if (isBul) return <p key={i} style={{ fontSize: 14, color: "#334155", margin: "3px 0", paddingLeft: 8 }}>{t}</p>;
        if (isSec) return <p key={i} style={{ fontWeight: 700, fontSize: 16, color: "#134e4a", marginTop: 24, marginBottom: 8 }}>{t}</p>;
        if (t.startsWith("Source:")) return <p key={i} style={{ fontSize: 11, color: "#94a3b8", marginTop: 20, fontStyle: "italic" }}>{t}</p>;
        return <p key={i} style={{ margin: "4px 0", fontSize: 14, color: "#334155" }}>{t}</p>;
      })}
    </div>
  );
}

        }
      `}</style>

      {/* Body: Sidebar + Content */}
      <div style={{ display: "flex", flex: 1, minHeight: 0 }}>
        {/* Mobile overlay */}
        {sidebarOpen && <div className="sidebar-overlay" style={{ display: "none", position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 199 }} onClick={() => setSidebarOpen(false)} />}

        {/* Sidebar */}
        <div className={`sidebar-panel ${sidebarOpen ? "open" : ""}`} style={{ position: "sticky", top: 0, height: "calc(100vh - 72px)", overflowY: "auto" }}>
          <Sidebar portfolio={PORTFOLIO_DATA} onFundClick={handleFundClick} />
        </div>

        {/* Main Content */}
        <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
          {/* Fund Filter */}
          <div style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", padding: "10px 16px", position: "sticky", top: 0, zIndex: 50, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
            <div style={{ display: "flex", gap: 5, overflowX: "auto", WebkitOverflowScrolling: "touch", scrollbarWidth: "none", paddingBottom: 2 }}>
              <button onClick={() => { setSelectedFund("ALL"); setSidebarOpen(false); }} style={{ padding: "4px 12px", borderRadius: 999, border: selectedFund === "ALL" ? "1.5px solid #0d9488" : "1px solid #e2e8f0", background: selectedFund === "ALL" ? "#0d9488" : "#fff", color: selectedFund === "ALL" ? "#fff" : "#64748b", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>ทั้งหมด</button>
              {activeFunds.map((f) => {
                const isA = selectedFund === f;
                const m = FUND_META[f];
                return (
                  <button key={f} onClick={() => { setSelectedFund(f); setSidebarOpen(false); }} style={{ padding: "4px 10px", borderRadius: 999, border: isA ? `1.5px solid ${m?.color||"#0d9488"}` : "1px solid #e2e8f0", background: isA ? (m?.color||"#0d9488") : "#fff", color: isA ? "#fff" : "#64748b", fontSize: 10, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0, display: "flex", alignItems: "center", gap: 3 }}>
                    {!isA && m && <span style={{ width: 5, height: 5, borderRadius: "50%", background: m.color }} />}
                    {f}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Articles */}
          <div style={{ flex: 1, padding: "16px 16px 40px", overflowY: "auto" }}>
            {loading ? (
              <div style={{ textAlign: "center", padding: 60, color: "#94a3b8", fontSize: 14 }}>
                <div style={{ width: 32, height: 32, border: "3px solid #e2e8f0", borderTopColor: "#0d9488", borderRadius: "50%", margin: "0 auto 12px", animation: "spin 1s linear infinite" }} />
                กำลังโหลดข้อมูล...
              </div>
            ) : groupedByDate.length === 0 ? (
              <div style={{ textAlign: "center", padding: 60, color: "#94a3b8", fontSize: 14 }}>ยังไม่มีบทความสำหรับกองทุนที่เลือก</div>
            ) : (
              groupedByDate.map(([date, dateArticles]) => (
                <div key={date} style={{ marginBottom: 24 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <div style={{ background: "linear-gradient(135deg, #0d9488, #0f766e)", color: "#fff", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 999 }}>📅 {formatThaiDate(date)}</div>
                    <div style={{ flex: 1, height: 1, background: "#d1d5db" }} />
                    <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 500 }}>{dateArticles.length} บทความ</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {dateArticles.map((article) => (
                      <div key={article.id} onClick={() => setSelectedArticle(article)}
                        style={{ background: "#fff", borderRadius: 10, padding: "14px 16px", border: "1px solid #e2e8f0", cursor: "pointer", transition: "all 0.15s", boxShadow: "0 1px 2px rgba(0,0,0,0.04)" }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = "#0d9488"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(13,148,136,0.12)"; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = "#e2e8f0"; e.currentTarget.style.boxShadow = "0 1px 2px rgba(0,0,0,0.04)"; }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                          <span style={{ fontSize: 10, fontWeight: 700, color: "#0f766e", background: "#ccfbf1", padding: "2px 7px", borderRadius: 4 }}>{CATEGORY_ICONS[article.category]} {CATEGORY_LABELS[article.category]}</span>
                        </div>
                        <h3 style={{ margin: "0 0 6px", fontSize: 14, fontWeight: 700, color: "#134e4a", lineHeight: 1.4 }}>{article.title}</h3>
                        <p style={{ margin: "0 0 10px", fontSize: 12, color: "#64748b", lineHeight: 1.5, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{article.summary}</p>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                            {article.funds.slice(0, 4).map((f) => <FundTag key={f} fund={f} small />)}
                            {article.funds.length > 4 && <span style={{ fontSize: 9, color: "#94a3b8", padding: "1px 5px", background: "#f1f5f9", borderRadius: 999, fontWeight: 600 }}>+{article.funds.length - 4}</span>}
                          </div>
                          <span style={{ fontSize: 11, color: "#0d9488", fontWeight: 600, flexShrink: 0 }}>อ่านต่อ →</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </div>

          {/* Footer */}
          <div style={{ background: "#115e59", color: "rgba(255,255,255,0.5)", textAlign: "center", padding: "12px 16px", fontSize: 10, flexShrink: 0 }}>
            LHFund Research Hub — บทวิเคราะห์เพื่อการศึกษาเท่านั้น ไม่ถือเป็นคำแนะนำการลงทุน
          </div>
        </div>

        {/* Right Panel: Technicals */}
        <div className="right-panel" style={{ position: "sticky", top: 0, height: "calc(100vh - 72px)", overflowY: "auto" }}>
          <TechnicalPanel data={technicals} />
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<LHFundResearchHub />);
  </script>
</body>
</html>
